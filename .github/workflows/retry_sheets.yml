name: Retry Google Sheets Upload

# [문제 1 해결] 동시성 제어: 워크플로우가 겹쳐 돌지 않도록 순차 큐잉 처리
concurrency:
  group: git-sync-queue
  cancel-in-progress: false

on:
  repository_dispatch:
    types: [trigger-retry]
  workflow_dispatch: 

jobs:
  retry-sheets:
    # 🍏 [AI/봇 검열 우회 전략] 가상 서버 환경을 Mac(macos-latest)으로 전격 교체!
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        shell: bash
    permissions:
      contents: write 
      id-token: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Create credentials.json from Secret
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run Retry Script
        run: node retry_sheets.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit and Push Updated Pending Sheets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pending_sheets.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🧹 Auto-clean pending_sheets.json after successful retry"
          git pull --rebase origin main || true
          git push
